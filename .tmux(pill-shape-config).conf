# --- TERMINAL OPTIMIZATION ---
# Enable True Color for Windows Terminal
set -as terminal-features ",xterm-256color:RGB"

# --- CORE NEOVIM-SPEED ---
set -s escape-time 0
set -g focus-events on
set -g mouse on

# --- PREFIX ---
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# --- WINDOWS PATH HANDLING ---
# Ensure new panes open in the same directory (Crucial for Nvim projects)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- NAVIGATION (The "Pseudo-Vim" Way) ---
# psmux doesn't always handle the 'is_vim' shell script well, 
# so we use direct bindings.
bind-key -n C-h select-pane -L
bind-key -n C-j select-pane -D
bind-key -n C-k select-pane -U
bind-key -n C-l select-pane -R

# --- VI MODE ---
set-window-option -g mode-keys vi
# Windows Clipboard Integration (using clip.exe)
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip.exe"

# --- RELOAD CONFIG ---
# Press Prefix + r to reload the configuration file
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# --- QUALITY OF LIFE ---
set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
setw -g aggressive-resize on
set -g renumber-windows on

# --- AESTHETICS (IMAGE-BASED BLOCKS) ---
set -g status-position top
set -g status-justify absolute-centre
set -g status-style bg=#1e1e2e,fg=#cdd6f4

# Colors (Catppuccin Mocha)
# Green: #a6e3a1, Blue: #89b4fa, Orange: #fab387, Pink: #f5c2e7, Gray: #313244, Surface: #45475a

# Left: [Icon] [Session] - Rounded start, sharp middle, rounded end
set -g status-left-length 50
set -g status-left "#{?client_prefix,#[fg=#f38ba8,bg=#1e1e2e]#[bg=#f38ba8,fg=#1e1e2e,bold]󱚝 #[fg=#f38ba8,bg=#313244]#[bg=#313244,fg=#cdd6f4] #S #[fg=#313244,bg=#1e1e2e],#[fg=#a6e3a1,bg=#1e1e2e]#[bg=#a6e3a1,fg=#1e1e2e]󰆍 #[fg=#a6e3a1,bg=#313244]#[bg=#313244,fg=#cdd6f4] #S #[fg=#313244,bg=#1e1e2e]}"

# Right: [Folder | Path] - Rounded start, rounded end
set -g status-right-length 50
set -g status-right "#[fg=#f5c2e7,bg=#1e1e2e]#[bg=#f5c2e7,fg=#1e1e2e]󰉋 #[fg=#1e1e2e,bg=#313244]#[bg=#313244,fg=#cdd6f4] #{b:pane_current_path} #[fg=#313244,bg=#1e1e2e]"

# Window Status (Split Block: Name | Index)
set -g window-status-separator " "

# Inactive: [ name ] [ index ]
set -g window-status-format "#[fg=#313244,bg=#1e1e2e]#[bg=#313244,fg=#cdd6f4] #W #[fg=#1e1e2e,bg=#45475a]#[bg=#45475a,fg=#cdd6f4] #I#[fg=#45475a,bg=#1e1e2e]"

# Active: [ name ] [ index ] (Blue theme)
set -g window-status-current-format "#[fg=#313244,bg=#1e1e2e]#[bg=#313244,fg=#cdd6f4] #W #[fg=#1e1e2e,bg=#89b4fa]#[bg=#89b4fa,fg=#1e1e2e,bold] #I#[fg=#89b4fa,bg=#1e1e2e]"

# Activity/Bell indicators
set -g window-status-activity-style "fg=#f9e2af,bg=#313244"
set -g window-status-bell-style "fg=#f38ba8,bg=#313244"

# --- PANE BORDERS ---
set -g pane-border-style fg=#313244
set -g pane-active-border-style fg=#cba6f7

# Pane number indicator
set -g display-panes-colour #45475a
set -g display-panes-active-colour #cba6f7

# --- PANE RESIZING (Vim-style) ---
# Use Prefix + Shift + h/j/k/l to resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- COPY MODE STYLING ---
# Selection color (Catppuccin Mauve)
set -g mode-style "fg=#1e1e2e,bg=#cba6f7,bold"

# --- MESSAGE STYLING ---
set -g message-style bg=#cba6f7,fg=#1e1e2e,bold



